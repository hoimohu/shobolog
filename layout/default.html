<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - {{blogName}}</title>
  <link rel="stylesheet" href="/src/default.css">
  {{requiredSourceTags}}
</head>
<body>
  <header class="center">
    <div><a href="/">{{blogName}}</a></div>
  </header>
  <main>
    <div id="metadata">
      <h1>{{title}}</h1>
      <div>書いた人: {{author}}</div>
      <div>更新日時: {{date}}</div>
      <div>タグ: {{tags}}</div>
    </div>
    <div id="content">{{content}}</div>
  </main>
  <footer class="center">
    <div><a href="/about">このサイトについて</a></div>
    <div>(c) 2026 hoimohu</div>
  </footer>
</body>
</html>
